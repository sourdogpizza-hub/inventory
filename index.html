<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOURDOG Inventory & Write-offs</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Loader Screen -->
        <div id="loader" class="screen active">
            <div class="spinner"></div>
            <p>Loading data...</p>
        </div>

        <!-- Access Blocked Screen -->
        <div id="blocked-screen" class="screen">
            <div class="blocked-container">
                <i class="fas fa-user-lock blocked-icon"></i>
                <h2>Access Restricted</h2>
                <p id="blocked-message">To use this bot, you must be a member of the SOURDOG Telegram group.</p>
            </div>
        </div>

        <!-- PIN Password Modal -->
        <div id="password-modal" class="modal">
            <div class="modal-content">
                <h3>Admin Access</h3>
                <p>Enter PIN code to proceed:</p>
                <input type="password" id="pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••">
                <div class="modal-buttons">
                    <button class="btn-cancel" onclick="closePasswordModal()">Cancel</button>
                    <button class="btn-confirm" onclick="checkPassword()">Verify</button>
                </div>
            </div>
        </div>

        <!-- Success Modal -->
        <div id="success-modal" class="modal">
            <div class="modal-content">
                <i class="fas fa-check-circle" style="font-size: 54px; color: #4cd964; margin-bottom: 16px;"></i>
                <h3 id="success-modal-title">Success!</h3>
                <p id="success-modal-message" style="margin-top: 8px; color: var(--tg-theme-hint-color); font-size: 15px; line-height: 1.4;"></p>
                <div class="modal-buttons" style="margin-top: 20px;">
                    <button class="btn-confirm" style="width: 100%;" onclick="closeSuccessModal()">OK</button>
                </div>
            </div>
        </div>

        <!-- Main Menu Screen -->
        <div id="menu-screen" class="screen">
            <div class="menu-header">
                <div class="logo-container">
                    <h1 class="subtitle" style="font-size: 18px; color: var(--tg-theme-text-color); margin: 0; letter-spacing: 1px; font-weight: bold;">KITCHEN MANAGEMENT</h1>
                </div>
                <button class="icon-btn-settings" onclick="openPasswordModal()"><i class="fas fa-cog"></i></button>
            </div>
            
            <div class="menu-options">
                <button class="menu-btn-large btn-inv" onclick="startAppMode('inventory')">
                    <i class="fas fa-clipboard-list"></i>
                    <span>Start Inventory</span>
                    <span class="btn-desc">Count current kitchen stock</span>
                </button>
                
                <button class="menu-btn-large btn-wroff" onclick="startAppMode('writeoff')">
                    <i class="fas fa-trash-alt"></i>
                    <span>Start Write-off</span>
                    <span class="btn-desc">Log wasted or used products</span>
                </button>
            </div>
        </div>

        <!-- Inventory / Write-off Screen -->
        <div id="inventory-screen" class="screen">
            <div class="header">
                <button class="icon-btn-back" onclick="goToMainMenu()"><i class="fas fa-arrow-left"></i></button>
                <h2 id="screen-title">Inventory</h2>
                <div style="width: 40px;"></div> <!-- Spacer for centering -->
            </div>

            <div class="list-container">
                <div id="inventory-container">
                    <!-- Categories and products will render here -->
                </div>
                <div class="submit-btn-container">
                    <button id="btn-submit-inventory" class="btn-main" onclick="submitInventory()">Submit Inventory</button>
                </div>
            </div>
        </div>

        <!-- Admin Edit Screen -->
        <div id="edit-screen" class="screen">
            <div class="header">
                <button class="icon-btn-back" onclick="goToMainMenu()"><i class="fas fa-arrow-left"></i></button>
                <h2>Edit Products</h2>
                <div style="width: 40px;"></div> <!-- Spacer -->
            </div>
            <div class="list-container">
                <div id="edit-container">
                    <!-- Categories and products editor -->
                </div>
                <div class="add-category-btn-container">
                    <button class="btn-secondary" onclick="addCategory()"><i class="fas fa-folder-plus"></i> Add Category</button>
                </div>
                <div class="submit-btn-container">
                    <button id="btn-submit-nomenclature" class="btn-main" onclick="submitNomenclature()">Save Database</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="tpl-inventory-category">
        <div class="category-block">
            <h3 class="category-title"></h3>
            <div class="products-list"></div>
        </div>
    </template>

    <template id="tpl-inventory-product">
        <div class="product-group">
            <div class="product-item">
                <div class="product-info">
                    <span class="product-name"></span>
                    <span class="product-unit"></span>
                </div>
                <div class="product-controls-simple">
                    <input type="number" class="amount-input-simple" value="" placeholder="0" inputmode="decimal">
                    <button class="btn-dots" onclick="showDotsMenu(this, event)"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </div>
            <div class="sub-inputs-container"></div>
        </div>
    </template>

    <template id="tpl-edit-category">
        <div class="category-block edit-mode">
            <div class="category-header-edit">
                <input type="text" class="category-name-input" placeholder="Category Name">
                <button class="icon-btn text-danger" onclick="deleteCategory(this)"><i class="fas fa-trash"></i></button>
            </div>
            <div class="products-list"></div>
            <button class="btn-secondary btn-sm" onclick="addProductToCategory(this)"><i class="fas fa-plus"></i> Add Product</button>
        </div>
    </template>

    <template id="tpl-edit-product">
        <div class="product-item edit-mode">
            <div class="edit-product-inputs">
                <input type="text" class="product-name-input" placeholder="Product Name">
                <input type="text" class="product-unit-input" placeholder="Total (kg, pcs, etc.)">
            </div>
            <button class="icon-btn text-danger" onclick="deleteProduct(this)"><i class="fas fa-trash"></i></button>
        </div>
    </template>

    <script src="app.js?v=6"></script>
</body>
</html>
